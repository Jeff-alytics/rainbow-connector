name: Refresh rainbow grid

# RETIRED: rainbow-grid.json is no longer used by the app. The national map now
# verifies clouds live per-candidate (NWS -> Open-Meteo), so this precomputed
# snapshot is dead. The schedule is disabled to stop pointless commits/rebuilds;
# compute_grid.js and the file are kept so this can be re-enabled if ever needed.
# Run manually from the Actions tab if you want to regenerate the snapshot.

on:
  workflow_dispatch: {}        # manual runs only — automatic schedule disabled

permissions:
  contents: write

concurrency:
  group: refresh-grid
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate grid
        run: node compute_grid.js

      - name: Commit if changed
        run: |
          git config user.name  "rainbow-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- rainbow-grid.json; then
            echo "No grid change."
          else
            git add rainbow-grid.json
            git commit -m "chore: refresh rainbow grid"
            git push
          fi
